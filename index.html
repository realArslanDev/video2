<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skill Bar</title>
    <link rel="stylesheet" href="video2.css">
</head>
<body>

<div class="container">
    <h1>My Skills</h1>

    <div class="skill">
        <p>HTML</p>
        <div class="skill-bar">
            <div class="skill-fill html">90%</div>
        </div>
    </div>

    <div class="skill">
        <p>CSS</p>
        <div class="skill-bar">
            <div class="skill-fill css">80%</div>
        </div>
    </div>

    <div class="skill">
        <p>JavaScript</p>
        <div class="skill-bar">
            <div class="skill-fill js">65%</div>
        </div>
    </div>

    <div class="skill">
        <p>Bootstrap</p>
        <div class="skill-bar">
            <div class="skill-fill bootstrap">75%</div>
        </div>
    </div>

</div>

</body>
</html>
</body>
</html>
